version: 2

models:
  - name: stg_crypto__prices
    description: >
      Deduplicated daily prices. Keeps the latest fetch for each (coin_id, price_date)
      pair using QUALIFY ROW_NUMBER().
    columns:
      - name: coin_id
        tests: [not_null]
      - name: price_date
        tests: [not_null]
      - name: close_usd
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: volume_usd
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "volume_usd is not null"
      - name: market_cap_usd
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "market_cap_usd is not null"

  - name: stg_crypto__coin_metadata
    description: Deduplicated coin metadata, one row per coin_id.
    columns:
      - name: coin_id
        tests:
          - not_null
          - unique
      - name: name
        tests: [not_null]
      - name: symbol
        tests: [not_null]
