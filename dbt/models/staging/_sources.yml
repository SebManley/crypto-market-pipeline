version: 2

sources:
  - name: crypto_raw
    description: Raw CoinGecko data written by the Python ingestion pipeline.
    database: "{{ env_var('GCP_PROJECT_ID', 'crypto-market-pipeline-502414') }}"
    schema: raw
    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 2, period: day}
    loaded_at_field: fetched_at

    tables:
      - name: prices
        description: Daily OHLCV + market cap per coin. Partitioned by fetched_date, clustered by coin_id.
        columns:
          - name: coin_id
            description: CoinGecko coin identifier (e.g. 'bitcoin').
            tests:
              - not_null
          - name: price_date
            description: The calendar date this price row represents.
            tests:
              - not_null
          - name: close_usd
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: "> 0"
          - name: volume_usd
            tests:
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: ">= 0"
                  config:
                    where: "volume_usd is not null"
          - name: market_cap_usd
            tests:
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: ">= 0"
                  config:
                    where: "market_cap_usd is not null"

      - name: coin_metadata
        description: Latest coin metadata fetched from CoinGecko.
        columns:
          - name: coin_id
            tests:
              - not_null
              - unique
          - name: name
            tests:
              - not_null
          - name: symbol
            tests:
              - not_null
